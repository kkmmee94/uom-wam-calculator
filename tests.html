<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculation tests — UoM WAM</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .test-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
    .test-list li { padding: 8px 12px; border-radius: 8px; font-size: 14px; display: flex; gap: 8px; align-items: baseline; background: var(--bg-elev); border: 1px solid var(--border); }
    .test-list li.fail { background: var(--danger-bg); color: var(--danger-text); border-color: rgba(220, 38, 38, 0.4); }
    .test-list li.ok { color: var(--text); }
    .test-list .icon { font-weight: 800; flex-shrink: 0; }
    .test-list .icon.ok { color: var(--ok-text); }
    .test-list .icon.fail { color: var(--fail); }
    .summary { font-size: 18px; font-weight: 700; padding: 12px 14px; border-radius: 10px; margin-top: 16px; }
    .summary.ok { background: var(--ok-bg); color: var(--ok-text); }
    .summary.fail { background: var(--danger-bg); color: var(--danger-text); }
    .err { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; opacity: 0.85; }
  </style>
</head>
<body>
  <main class="container app-main">
    <h1>Calculation tests</h1>
    <p>Pure-function tests for the WAM calculator's math. Each test runs in your browser.</p>
    <ul id="results" class="test-list"></ul>
    <div id="summary" class="summary"></div>
    <p style="margin-top: 24px;"><a href="index.html">← Back to the calculator</a></p>
  </main>

  <script type="module">
    import { runTests, summarize } from './js/tests.js';
    const results = runTests();
    const s = summarize(results);
    const root = document.getElementById('results');
    for (const r of results) {
      const li = document.createElement('li');
      li.className = r.ok ? 'ok' : 'fail';
      const icon = r.ok ? '✓' : '✗';
      li.innerHTML = `<span class="icon ${r.ok ? 'ok' : 'fail'}">${icon}</span><span>${r.name}</span>${r.ok ? '' : `<span class="err">${r.error || ''}</span>`}`;
      root.appendChild(li);
    }
    const summary = document.getElementById('summary');
    summary.className = 'summary ' + (s.failed ? 'fail' : 'ok');
    summary.textContent = `${s.passed}/${s.total} passed${s.failed ? `, ${s.failed} failed` : ' — all green'}`;
  </script>
</body>
</html>
